version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
PREMBLY_API_KEY = "${PREMBLY_API_KEY}"
PREMBLY_APP_ID = "${PREMBLY_APP_ID}"
PREMBLY_WEBHOOK_SECRET = "${PREMBLY_WEBHOOK_SECRET}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
POCHI_LOG = "debug"
PREMBLY_API_KEY = "${PREMBLY_API_KEY}"
PREMBLY_APP_ID = "${PREMBLY_APP_ID}"
PREMBLY_WEBHOOK_SECRET = "${PREMBLY_WEBHOOK_SECRET}"

[solution.env]